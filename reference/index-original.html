// ─── CROSSFADE HERO ───────────────────────────────────
function CrossfadeHero({ image1, image2 }) {
  const img1Ref = useRef(null);
  const img2Ref = useRef(null);
  const rafRef1 = useRef(null);
  const rafRef2 = useRef(null);
  const FADE_MS = 3000;
  const HOLD_MS = 5000;

  function fadeTo(imgRef, rafRefLocal, targetOpacity, durationMs) {
    cancelAnimationFrame(rafRefLocal.current);
    const el = imgRef.current;
    if (!el) return;
    const startOpacity = parseFloat(el.style.opacity) || 0;
    const startTime = performance.now();
    function step(now) {
      const t = Math.min((now - startTime) / durationMs, 1);
      el.style.opacity = startOpacity + (targetOpacity - startOpacity) * t;
      if (t < 1) rafRefLocal.current = requestAnimationFrame(step);
    }
    rafRefLocal.current = requestAnimationFrame(step);
  }

  useEffect(() => {
    if (!img1Ref.current || !img2Ref.current) return;
    img1Ref.current.style.opacity = "1";
    img2Ref.current.style.opacity = "0";
    let cancelled = false;
    let showingFirst = true;

    function cycle() {
      if (cancelled) return;
      setTimeout(() => {
        if (cancelled) return;
        if (showingFirst) {
          fadeTo(img2Ref, rafRef2, 1, FADE_MS);
          fadeTo(img1Ref, rafRef1, 0, FADE_MS);
        } else {
          fadeTo(img1Ref, rafRef1, 1, FADE_MS);
          fadeTo(img2Ref, rafRef2, 0, FADE_MS);
        }
        showingFirst = !showingFirst;
        setTimeout(cycle, FADE_MS + 200);
      }, HOLD_MS);
    }
    cycle();
    return () => {
      cancelled = true;
      cancelAnimationFrame(rafRef1.current);
      cancelAnimationFrame(rafRef2.current);
    };
  }, []);

  const imgStyle = {
    width: "120%", height: "120%", objectFit: "cover", objectPosition: "center top",
    position: "absolute", left: "50%", top: 0, transform: "translateX(-50%)"
  };

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
          <img ref={img1Ref} src={image1} alt="" style={{ ...imgStyle, opacity: 1 }} />
          <img ref={img2Ref} src={image2} alt="" style={{ ...imgStyle, opacity: 0 }} />
        </div>);

}

// ─── FADING VIDEO ─────────────────────────────────────
function FadingVideo({ src, className, style, maxOpacity = 1 }) {
  const videoRef = useRef(null);
  const rafRef = useRef(null);
  const fadingOutRef = useRef(false);
  const FADE_MS = 500;
  const FADE_OUT_LEAD = 0.55;

  function fadeTo(targetOpacity, durationMs) {
    const el = videoRef.current;
    if (!el) return;
    cancelAnimationFrame(rafRef.current);
    const startOpacity = parseFloat(el.style.opacity) || 0;
    const startTime = performance.now();
    function step(now) {
      const t = Math.min((now - startTime) / durationMs, 1);
      el.style.opacity = startOpacity + (targetOpacity - startOpacity) * t;
      if (t < 1) rafRef.current = requestAnimationFrame(step);
    }
    rafRef.current = requestAnimationFrame(step);
  }

  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    function onLoadedData() {video.style.opacity = "0";video.play().catch(() => {});fadeTo(maxOpacity, FADE_MS);}
    function onTimeUpdate() {
      if (!fadingOutRef.current && video.duration - video.currentTime <= FADE_OUT_LEAD && video.duration - video.currentTime > 0) {
        fadingOutRef.current = true;fadeTo(0, FADE_MS);
      }
    }
    function onEnded() {
      video.style.opacity = "0";
      setTimeout(() => {video.currentTime = 0;video.play().catch(() => {});fadingOutRef.current = false;fadeTo(maxOpacity, FADE_MS);}, 100);
    }
    video.addEventListener("loadeddata", onLoadedData);
    video.addEventListener("timeupdate", onTimeUpdate);
    video.addEventListener("ended", onEnded);
    return () => {cancelAnimationFrame(rafRef.current);video.removeEventListener("loadeddata", onLoadedData);video.removeEventListener("timeupdate", onTimeUpdate);video.removeEventListener("ended", onEnded);};
  }, []);

  return (
    <video ref={videoRef} src={src} autoPlay muted playsInline preload="auto" loop={false}
    className={className} style={{ ...style, opacity: 0 }} />);

}

function BlurText({ text, className, justify = "center" }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, amount: 0.1 });
  const words = text.split(" ");
  return (
    <p ref={ref} style={{ display: "flex", flexWrap: "wrap", rowGap: "0.1em",
      justifyContent: justify === "left" ? "flex-start" : "center" }} className={className}>
          {words.map((word, i) =>
      <motion.span key={i}
      initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
      animate={inView ? { filter: ["blur(10px)", "blur(5px)", "blur(0px)"], opacity: [0, 0.5, 1], y: [50, -5, 0] } : {}}
      transition={{ duration: 0.7, times: [0, 0.5, 1], ease: "easeOut", delay: i * 0.1 }}
      style={{ display: "inline-block", marginRight: "0.28em" }}>
              {word}
            </motion.span>
      )}
        </p>);

}

function SectionReveal({ children, delay = 0, className }) {
  const ref = useRef(null);

    transition={{ duration: 0.7, ease: "easeOut", delay }}

}
